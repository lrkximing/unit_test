  and unchanged scenario/test names:

  {current_test_case}

  ====================
  REJECTED CANDIDATE TO REPAIR
  ====================
  This candidate was rejected and was NOT applied. Use this candidate as the starting draft
  for your next complete file, preserving its useful edits, but fix the rejection reason:

  {rejected_candidate_code}

  ====================
  REJECTED CANDIDATE DIFF FOR AUDIT
  ====================
  {rejected_patch}

  ====================
  REJECTION REASON
  ====================
  {rejection_reason}

  ====================
  RULES
  ====================
  - Return ONLY the complete updated contents of {test_file_name}.
  - Do not return a unified diff. The framework validates the complete candidate file, saves a diff for audit, and overwrites the current test only after validation passes.
  - Start from REJECTED CANDIDATE TO REPAIR when it is non-empty, because it may contain useful partial edits.
  - Use CURRENT TEST IMPLEMENTATION as the protected reference. Restore protected/frozen regions from it if the rejected candidate changed them.
  - If the rejected candidate is empty or identical to CURRENT TEST IMPLEMENTATION, make the smallest concrete edit required by the failure stage.
  - If the rejection is only a missing RACA_CHECK/RACA_EFFECT/RACA_WITNESS/RACA_SCENARIO
    binding, only add or move the required marker/assertion in the implicated test
    function. Do not rewrite helper/fake/mock code for a pure binding repair.
  - Keep the original task intent; do not rewrite unrelated code.
  - During repair stages, keep existing test function names stable. Do not delete a failing
    test and add a replacement under a new name.
  - Do not modify includes, extern declarations, driver-local definitions, frozen tests, or already passing scenario tests.
  - Do not invent external test harness/control APIs. Any helper/fake control function must be fully defined in the current test file.
  - Do not remove RACA_SCENARIO, RACA_CHECK, RACA_EFFECT, or RACA_WITNESS bindings.
  - Do not bind multiple test functions to the same scenario.
  - If the rejection was caused by validation, fix only the validation violation while preserving the intended repair.
  - If the rejection says no source-code changes were produced, the previous rewrite
    was identical to the current file or empty. You MUST make the smallest concrete source
    edit required by the failure stage; returning the current file unchanged is invalid.
  - If a fake/helper was rejected as unused, either connect it to a real production call path
    through existing object/callback/setup code, or remove that fake and repair the test
    without pretending that it controls the boundary.
  - If a candidate failed to build because a hook setter expected a different function
    pointer type, repair the fake signature to exactly match the expected type and keep
    configurable fake behavior in separate `static` state variables. Do not use casts or
    assignments to function symbols/calls as a workaround.

  Return ONLY the complete C source. Do not include explanations or markdown outside the file.
